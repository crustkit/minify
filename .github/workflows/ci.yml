name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: cargo check
      - run: npx napi build --platform
      - run: npx tsc --noEmit
      - run: npx vitest run
