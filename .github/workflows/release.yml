name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.1, 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (linux aarch64)
        if: contains(matrix.target, 'aarch64') && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to npm packages
        run: npx napi artifacts --artifacts-dir artifacts

      - name: Build TypeScript
        run: npm run build:ts

      - name: Set version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx napi prepublish -t npm
          npm publish --access public

      - name: Create git tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
